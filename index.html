<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio</title>

<style>
  body { font-family: Arial; margin: 0; }

  nav {
    background: #333;
    padding: 15px;
    text-align: center;
  }
  nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    cursor: pointer;
  }

  section {
    display: none;
    padding: 50px;
    text-align: center;
  }

  .active {
    display: block;
  }
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <a onclick="showPage('home')">Home</a>
  <a onclick="showPage('about')">About</a>
  <a onclick="showPage('skills')">Skills</a>
  <a onclick="showPage('contact')">Contact</a>
</nav>

<!-- HOME -->
<section id="home" class="active">
  <h1>ROSE BRIJIT ABEY</h1>
  <p>Web Designer</p>
  <img src="profile.jpg" alt="Rose Brijit Abey" style="width:200px; border-radius:50%; margin-top:20px;">
</section>

<!-- ABOUT -->
<section id="about">
  <h2>About Me</h2>
  <p>I am a passionate web designer creating modern websites.</p>
</section>

<!-- SKILLS -->
<section id="skills">
  <h2>Skills</h2>
  <p>HTML | CSS | JavaScript | UI/UX</p>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  
  <!-- Email -->
  <p>Email: <a href="mailto:rose@example.com">rose@example.com</a></p>

  <!-- Fixed LinkedIn -->
  <p>
    LinkedIn:
    <a href="https://www.linkedin.com/in/rose-brijit-abey-b9a1b034b" target="_blank">
      View Profile
    </a>
  </p>
</section>

<script>
function showPage(pageId) {
  let sections = document.querySelectorAll("section");
  sections.forEach(sec => sec.classList.remove("active"));

  document.getElementById(pageId).classList.add("active");
}
</script>

</body>
</html>
